schemaVersion: 2.2.0
metadata:
  name: dac-toolkit
  description: >
    Documentation-as-Code toolkit workspace with docx_builder, mmdc, and Pandoc.
    Converts Markdown + YAML front matter to styled DOCX. Fully offline when
    using the pre-built custom image.

# ── Projects ─────────────────────────────────────────────────────────────────
# The toolkit repo is always included. Add your content repos below.
# Each repo is cloned to /projects/<name>/ in the workspace.
projects:
  - name: dac-toolkit
    git:
      remotes:
        origin: https://github.com/KhalilGibrotha/dac-toolkit
      checkoutFrom:
        revision: main

  # Uncomment and edit to add content repos:
  # - name: architecture-docs
  #   git:
  #     remotes:
  #       origin: https://github.com/KhalilGibrotha/architecture-docs
  #     checkoutFrom:
  #       revision: master

# ── Components ───────────────────────────────────────────────────────────────
components:

  # Development container — custom image with all tools pre-baked:
  #   mmdc (mermaid-cli), Vale, Pandoc, gh CLI, Python deps
  #
  # To revert to the generic UDI (no mmdc/Vale), change image to:
  #   image: registry.redhat.io/devspaces/udi-rhel8:latest
  #
  - name: tools
    container:
      image: ghcr.io/khalilgibrotha/dac-toolkit:latest
      memoryRequest: 512Mi
      memoryLimit: 4Gi
      cpuRequest: 250m
      cpuLimit: 2000m
      mountSources: true
      sourceMapping: /projects
      env:
        - name: PUPPETEER_CONFIG
          value: /opt/puppeteer-config.json
        - name: PUPPETEER_CACHE_DIR
          value: /opt/puppeteer-cache
        - name: DAC_TOOLKIT_DIR
          value: /projects/dac-toolkit
      endpoints:
        - name: docs-preview
          targetPort: 8080
          exposure: internal

  # Persistent volume for exported documents
  - name: exports-volume
    volume:
      size: 1Gi

# ── Commands ─────────────────────────────────────────────────────────────────
commands:

  # Runs after workspace starts. Detects whether tools are pre-baked
  # (custom Dockerfile.devspaces image) or need runtime installation (UDI).
  - id: install-tools
    exec:
      component: tools
      commandLine: |
        # NOTE: No "set -e" — each section handles its own errors so a
        # non-critical tool failure doesn't crash the entire workspace.

        # ── mmdc (mermaid-cli) ──────────────────────────────────────────
        # mmdc + Puppeteer/Chromium cannot be installed at runtime in most
        # Dev Spaces environments. Use the custom image (Dockerfile.devspaces)
        # for full mmdc support. This block is best-effort only.
        if command -v mmdc &>/dev/null; then
          echo "=== mmdc already installed (pre-baked image) ==="
        else
          echo "=== Attempting mmdc install (may fail on UDI — use custom image for full support) ==="
          if npm install -g @mermaid-js/mermaid-cli 2>&1; then
            PUPCONFIG="/opt/puppeteer-config.json"
            echo '{"args":["--no-sandbox","--disable-setuid-sandbox","--disable-dev-shm-usage"]}' \
              > "$PUPCONFIG" 2>/dev/null || {
              PUPCONFIG="$HOME/.puppeteer-config.json"
              echo '{"args":["--no-sandbox","--disable-setuid-sandbox","--disable-dev-shm-usage"]}' \
                > "$PUPCONFIG"
            }
            export PUPPETEER_CONFIG="$PUPCONFIG"
          else
            echo "WARN: mmdc install failed — diagram rendering unavailable. Use custom image."
          fi
        fi

        # ── Vale prose linter ───────────────────────────────────────────
        if command -v vale &>/dev/null; then
          echo "=== Vale already installed (pre-baked image) ==="
        else
          echo "INFO: Vale not found — use custom image for prose linting support"
        fi

        # ── Vale styles bootstrap (copy pre-baked styles into content repos) ──
        if [ -d /opt/vale-styles ]; then
          for repo in /projects/*/; do
            if [ -f "$repo/.vale.ini" ]; then
              mkdir -p "$repo/.vale/styles"
              cp -rn /opt/vale-styles/* "$repo/.vale/styles/" 2>/dev/null || true
              echo "=== Vale styles copied to $repo ==="
            fi
          done
        fi

        # ── Python dependencies + docx_builder ─────────────────────────
        if command -v docx-build &>/dev/null; then
          echo "=== docx_builder already installed (pre-baked image) ==="
        else
          echo "=== Installing docx_builder dependencies ==="
          pip install --quiet "python-docx>=1.1.0" "PyYAML>=6.0" "mistune>=3.0" "lxml>=4.9" || \
            echo "WARN: Failed to install Python dependencies"
        fi

        # Install editable docx_builder from project clone if available.
        # This path may not exist yet if the git clone is still in progress —
        # the pre-baked image version remains available as a fallback.
        if [ -d /projects/dac-toolkit/docx_builder ]; then
          pip install --quiet --no-deps -e /projects/dac-toolkit/docx_builder 2>/dev/null && \
            echo "=== docx_builder (editable) installed from /projects/dac-toolkit ===" || \
            echo "WARN: Editable install failed — using pre-baked version"
        else
          echo "INFO: /projects/dac-toolkit not yet cloned — using pre-baked docx_builder"
        fi

        # ── Verify ──────────────────────────────────────────────────────
        echo "=== Verifying tools ==="
        mmdc --version 2>/dev/null || echo "WARN: mmdc not available (diagram rendering disabled)"
        pandoc --version 2>/dev/null | head -1 || echo "WARN: pandoc not available"
        docx-build --help | head -1 2>/dev/null || echo "WARN: docx-build not available"
        vale --version 2>/dev/null || echo "INFO: vale not installed"
        echo "=== Workspace ready ==="
      workingDir: /projects

  # Build all DOCX documents from a content repo
  - id: build-all-docs
    exec:
      component: tools
      commandLine: >
        bash /projects/dac-toolkit/scripts/build-docs.sh
        /projects/architecture-docs
      workingDir: /projects
      group:
        kind: build

  # Render diagrams only
  - id: render-diagrams
    exec:
      component: tools
      commandLine: >
        bash /projects/dac-toolkit/scripts/render-diagrams.sh
        /projects/architecture-docs
      workingDir: /projects
      group:
        kind: build

  # Build a single document (edit the path as needed)
  - id: build-single-doc
    exec:
      component: tools
      commandLine: >
        docx-build "${CURRENT_FILE:-/projects/dac-toolkit/docx_builder/examples/sample_input.md}"
        --output /projects/exports/preview.docx
      workingDir: /projects
      group:
        kind: build

# ── Lifecycle Events ─────────────────────────────────────────────────────────
events:
  postStart:
    - install-tools
